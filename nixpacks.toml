[phases.setup]
nixPkgs = ["nodejs_24"]

[phases.install]
cmds = [
  "npm install -g pnpm@10",
  "pnpm install --frozen-lockfile --ignore-scripts"
]

[phases.build]
cmds = [
  "pnpm run typecheck:libs",
  "pnpm --filter @workspace/api-server run build"
]

[start]
cmd = "node --enable-source-maps artifacts/api-server/dist/index.mjs"
